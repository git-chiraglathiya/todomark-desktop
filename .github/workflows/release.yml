name: Build and Release TodoMark Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-release:
    name: Build macOS bundle and publish release
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build TodoMark bundle
        run: npm run tauri:build

      - name: Verify app signature
        run: |
          set -euo pipefail
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No .app bundle found in macOS output directory."
            exit 1
          fi
          echo "Verifying signature for: ${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl -a -vv "${APP_PATH}" || true

      - name: Upload build artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TodoMark ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz.sig
